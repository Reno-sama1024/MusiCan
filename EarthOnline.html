<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>MusiCan V4.8 - Ultimate Stability & Visuals</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 24px; pointer-events: none; mix-blend-mode: difference; z-index: 10; }
        #ui { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        .btn { padding: 15px 40px; background: #ffaa00; border: none; cursor: pointer; font-weight: bold; font-size: 18px; color: #000; margin-top: 20px; }
        #upload-zone { border: 2px dashed #ffaa00; padding: 20px; margin-bottom: 20px; cursor: pointer; background: rgba(255,165,0,0.1); width: 400px; }
        #hint { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: #ffaa00; padding: 10px 20px; display: none; border: 1px solid #ffaa00; z-index: 50; }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="hint">按 [F] 互動</div>
    <div id="ui">
        <h1 style="color:#ffaa00">MusiCan V4.8</h1>
        <p>太陽/月亮回歸 | 地面磨砂化 | 門物理碰撞</p>
        <div id="upload-zone" onclick="document.getElementById('file-input').click()">
            <strong>點此載入貼圖 (floor, wall, door)</strong>
        </div>
        <input type="file" id="file-input" multiple style="display:none">
        <button class="btn" onclick="document.body.requestPointerLock()">進入場景</button>
    </div>

    <script src="https://unpkg.com/three@0.134.0/build/three.min.js"></script>
    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>

    <script>
        const world = new CANNON.World();
        world.gravity.set(0, -25, 0);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 20000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        document.body.appendChild(renderer.domElement);

        // --- 1. 光暈生成器 ---
        function createGlow(color, intensity, scale) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            const grd = ctx.createRadialGradient(128,128,0, 128,128,128);
            const c = new THREE.Color(color);
            grd.addColorStop(0, `rgba(${c.r*255},${c.g*255},${c.b*255},${intensity})`);
            grd.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grd; ctx.fillRect(0,0,256,256);
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex, blending: THREE.AdditiveBlending, depthWrite: false });
            const s = new THREE.Sprite(mat);
            s.scale.set(scale, scale, 1);
            return s;
        }

        // --- 2. 天體系統 ---
        let time = 8;
        const daySpeed = 0.04;
        const DISTANCE = 10000; // 太陽掛在遠方
        const celestialPivot = new THREE.Group();
        celestialPivot.rotation.z = Math.PI * 0.15;
        scene.add(celestialPivot);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2.8);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.set(4096, 4096);
        sunLight.shadow.camera.left = sunLight.shadow.camera.bottom = -30;
        sunLight.shadow.camera.right = sunLight.shadow.camera.top = 30;
        sunLight.shadow.bias = -0.0005; 
        sunLight.shadow.normalBias = 0.05;

        const sunGroup = new THREE.Group();
        sunGroup.position.y = DISTANCE;
        sunGroup.add(sunLight);
        sunGroup.add(createGlow(0xffccaa, 1.0, 1500)); // 太陽光圈
        celestialPivot.add(sunGroup);

        const moonLight = new THREE.DirectionalLight(0x556699, 0.5);
        const moonGroup = new THREE.Group();
        moonGroup.position.y = -DISTANCE;
        moonGroup.add(moonLight);
        moonGroup.add(createGlow(0x99aaff, 0.6, 800)); // 月亮光圈
        celestialPivot.add(moonGroup);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.02);
        scene.add(ambientLight);

        // --- 3. 材質 (全磨砂、無反光) ---
        const outdoorFloorMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 1.0, metalness: 0.0 });
        const indoorFloorMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 1.0, metalness: 0.0 });
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 1.0 });
        const doorMat = new THREE.MeshStandardMaterial({ color: 0x221100, roughness: 1.0 });

        function addStaticBox(w, h, d, x, y, z, mat) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const m = new THREE.Mesh(geo, mat);
            m.position.set(x, y, z); m.castShadow = m.receiveShadow = true;
            scene.add(m);
            const b = new CANNON.Body({ mass: 0, shape: new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)) });
            b.position.set(x, y, z); world.addBody(b);
            return m;
        }

        addStaticBox(5000, 0.2, 5000, 0, -0.15, 0, outdoorFloorMat);
        addStaticBox(10, 0.2, 10, 0, -0.1, 0, indoorFloorMat);
        addStaticBox(0.8, 4, 10, -5, 2, 0, wallMat); 
        addStaticBox(0.8, 4, 10, 5, 2, 0, wallMat);
        addStaticBox(10, 4, 0.8, 0, 2, -5, wallMat);
        addStaticBox(4, 4, 0.8, -3, 2, 5, wallMat);
        addStaticBox(4, 4, 0.8, 3, 2, 5, wallMat);
        addStaticBox(2, 1, 0.8, 0, 3.5, 5, wallMat);
        addStaticBox(10.8, 0.8, 10.8, 0, 4.2, 0, wallMat);

        // --- 4. 門的物理同步 ---
        const doorPivot = new THREE.Group();
        const doorVisual = new THREE.Mesh(new THREE.BoxGeometry(2, 3, 0.25), doorMat);
        doorVisual.position.set(1, 1.5, 0); 
        doorVisual.castShadow = doorVisual.receiveShadow = true;
        doorPivot.add(doorVisual);
        doorPivot.position.set(-1, 0, 5); 
        scene.add(doorPivot);

        const doorBody = new CANNON.Body({ mass: 0 });
        doorBody.addShape(new CANNON.Box(new CANNON.Vec3(1, 1.5, 0.125)), new CANNON.Vec3(1, 1.5, 0));
        doorBody.position.set(-1, 0, 5);
        world.addBody(doorBody);

        const inLight = new THREE.PointLight(0xffcc88, 0, 15);
        inLight.position.set(0, 3.5, 0);
        inLight.castShadow = true;
        scene.add(inLight);

        const switchBox = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.1), new THREE.MeshStandardMaterial({color:0x444444}));
        switchBox.position.set(-1.5, 1.5, 4.5);
        scene.add(switchBox);

        // --- 5. 邏輯 ---
        const playerBody = new CANNON.Body({ mass: 70, shape: new CANNON.Sphere(0.7), fixedRotation: true, position: new CANNON.Vec3(0, 2, 12) });
        world.addBody(playerBody);

        let keys = {}, yaw = 0, pitch = 0, doorOpen = false, lightOn = false;
        window.onkeydown = e => { 
            keys[e.key.toLowerCase()] = true; 
            if(e.key === 'f') {
                const ray = new THREE.Raycaster();
                ray.setFromCamera(new THREE.Vector2(), camera);
                if(ray.intersectObject(doorVisual).length > 0) doorOpen = !doorOpen;
                if(ray.intersectObject(switchBox).length > 0) lightOn = !lightOn;
            }
        };
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;
        document.addEventListener('mousemove', e => { if(document.pointerLockElement){ yaw -= e.movementX*0.002; pitch -= e.movementY*0.002; pitch=Math.max(-1.5, Math.min(1.5, pitch)); }});

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            world.step(1/60);

            time += delta * daySpeed;
            if(time > 24) time = 0;
            const angle = (time / 24) * Math.PI * 2 + Math.PI;
            celestialPivot.rotation.x = angle;
            const sunY = Math.cos(angle);
            sunLight.intensity = sunY > -0.1 ? 3.0 : 0;
            
            const skyColor = new THREE.Color();
            if(sunY > 0) skyColor.setHSL(0.6, 0.6, 0.05 + sunY * 0.4);
            else skyColor.setHSL(0.65, 0.8, 0.01);
            scene.background = skyColor;
            
            sunLight.shadow.camera.position.copy(camera.position);
            inLight.intensity = lightOn ? 5.0 : 0;

            const targetRot = doorOpen ? 1.6 : 0;
            doorPivot.rotation.y += (targetRot - doorPivot.rotation.y) * 0.1;
            doorBody.quaternion.setFromEuler(0, doorPivot.rotation.y, 0);

            if(document.pointerLockElement) {
                const move = new THREE.Vector3();
                if(keys['w']) move.z -= 1; if(keys['s']) move.z += 1;
                if(keys['a']) move.x -= 1; if(keys['d']) move.x += 1;
                move.applyQuaternion(new THREE.Quaternion().setFromEuler(new THREE.Euler(0, yaw, 0)));
                move.normalize();
                playerBody.velocity.x = move.x * (keys['shift'] ? 22 : 11);
                playerBody.velocity.z = move.z * (keys['shift'] ? 22 : 11);
            }

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            camera.position.copy(playerBody.position); camera.position.y += 0.8;

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(), camera);
            const interacts = ray.intersectObjects([doorVisual, switchBox]);
            document.getElementById('hint').style.display = interacts.length > 0 ? 'block' : 'none';

            renderer.render(scene, camera);
        }
        animate();

        document.getElementById('file-input').onchange = (e) => {
            const loader = new THREE.TextureLoader();
            for(let f of e.target.files) {
                const url = URL.createObjectURL(f);
                const name = f.name.toLowerCase();
                const tex = loader.load(url);
                tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
                let targets = [];
                if(name.includes('wall')) targets.push(wallMat);
                else if(name.includes('door')) targets.push(doorMat);
                else if(name.includes('floor')) { targets.push(outdoorFloorMat); targets.push(indoorFloorMat); }
                let repeat = name.includes('door') ? 1 : (name.includes('wall') ? 10 : 50);
                tex.repeat.set(repeat, repeat);
                targets.forEach(target => {
                    if(name.includes('color') || name.includes('albedo')) target.map = tex;
                    if(name.includes('normal')) target.normalMap = tex;
                    if(name.includes('rough')) target.roughnessMap = tex;
                    if(name.includes('ao')) { target.aoMap = tex; target.aoMapIntensity = 2.0; }
                    target.needsUpdate = true;
                });
            }
        };
        document.addEventListener('pointerlockchange', () => { document.getElementById('ui').style.display = document.pointerLockElement ? 'none' : 'flex'; });
    </script>
</body>
</html>
