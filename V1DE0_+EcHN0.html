<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>V1DE0_+EcHN0 | Ultimate Texture</title>
    <style>
        /* 全局變色核心 - 加上 transition 確保變色時是平滑的 */
        :root { 
            --neon: #00ffff; 
            --neon-rgb: 0, 255, 255; 
            transition: 0.8s ease; 
        }
        
        * { margin:0; padding:0; box-sizing:border-box; overflow:hidden; user-select: none; }
        body { background: #050510; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }

		body.is-embedded header {
			display: none;
		}
		
		body.is-embedded .main-container {
			height: 100vh;
		}
        /* --- 標題欄 & Glitch --- */
        header { 
            height: 70px; background: rgba(10,10,31,0.95); 
            border-bottom: 2px solid var(--neon); 
            display: flex; align-items: center; justify-content: center; 
            position: relative; z-index: 100;
            transition: border-color 0.8s ease; /* 變色過渡 */
        }
        
        /* 更新 Logo 樣式：加入跳轉提示與縮放感 */
        .logo { 
            font-size: 28px; font-weight: bold; letter-spacing: 5px; 
            text-shadow: 0 0 15px var(--neon); position: relative; 
            transition: text-shadow 0.8s ease, transform 0.3s ease; 
            cursor: crosshair; /* 隱藏功能的暗示游標 */
        }
        .logo:active { transform: scale(0.95); } /* 點擊物理回饋 */

        .logo::before, .logo::after { content: "V1DE0_+EcHN0"; position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8; }
        .logo::before { left: 2px; text-shadow: -2px 0 #ff00ff; clip: rect(44px, 450px, 56px, 0); animation: glitch-1 5s infinite linear alternate-reverse; }
        .logo::after { left: -2px; text-shadow: -2px 0 #00ffff; clip: rect(44px, 450px, 56px, 0); animation: glitch-2 5s infinite linear alternate-reverse; }
        
        @keyframes glitch-1 { 0% { clip: rect(10px, 999px, 25px, 0); } 100% { clip: rect(40px, 999px, 50px, 0); } }
        @keyframes glitch-2 { 0% { clip: rect(30px, 999px, 15px, 0); } 100% { clip: rect(10px, 999px, 45px, 0); } }

        /* ⚙️ 設定按鍵：旋轉小巧思 */
        .setting-icon { 
            position: absolute; right: 30px; font-size: 24px; cursor: pointer; 
            color: var(--neon); 
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.8s, opacity 0.3s, text-shadow 0.3s; 
        }
        .setting-icon:hover { 
            transform: rotate(90deg); 
            text-shadow: 0 0 15px var(--neon); 
        }
        .setting-icon.hidden { opacity: 0; pointer-events: none; }

        /* --- 影片區 --- */
        .main-container { flex: 1; display: flex; position: relative; }
        .video-section { flex: 1; background: #000; position: relative; overflow: hidden; }
        video { width: 100%; height: 100%; }

        #pause-indicator {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90px; height: 90px; background: rgba(255,255,255,0.15); border-radius: 50%;
            display: none; align-items: center; justify-content: center; pointer-events: none; z-index: 50;
        }
        #pause-indicator::before, #pause-indicator::after { content: ""; width: 12px; height: 35px; background: rgba(255,255,255,0.5); margin: 0 6px; }

        .controls { 
            position: absolute; bottom: -80px; left: 0; width: 100%; height: 70px; 
            background: rgba(5,5,20,0.9); backdrop-filter: blur(10px);
            display: flex; align-items: center; padding: 0 25px; gap: 20px; 
            border-top: 1px solid var(--neon); z-index: 1000; 
            transition: bottom 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28), border-color 0.8s;
        }
        .video-section:hover .controls { bottom: 0; }
        
        #progress-wrap { flex: 1; height: 20px; display: flex; align-items: center; cursor: pointer; }
        #progress-bar { width: 100%; height: 5px; background: #222; position: relative; }
        #progress-inner { 
            height: 100%; background: var(--neon); width: 0%; 
            box-shadow: 0 0 10px var(--neon); 
            transition: background 0.8s, box-shadow 0.8s; 
        }

        .btn { color: var(--neon); cursor: pointer; font-size: 20px; transition: 0.3s, color 0.8s; }
        .btn:hover { text-shadow: 0 0 10px var(--neon); }
        .fs-rect { width: 22px; height: 15px; border: 2px solid var(--neon); border-radius: 2px; transition: border-color 0.8s; }

        /* --- 右側清單 --- */
        aside { 
            width: 340px; background: rgba(10,10,25,0.98); 
            border-left: 2px solid var(--neon); 
            display: flex; flex-direction: column; 
            transition: width 0.5s, border-color 0.8s; 
        }
        aside.collapsed { width: 0; border-left: 0; }
        
        .list-header { padding: 15px; font-size: 12px; color: var(--neon); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; transition: color 0.8s; }
        .play-all-btn { cursor: pointer; padding: 2px 10px; border: 1px solid var(--neon); border-radius: 12px; font-size: 10px; transition: 0.3s; }
        .play-all-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }

        #vList { flex:1; overflow-y:auto; padding: 5px 0; }
        .v-item { 
            padding: 15px; margin: 5px 10px; background: rgba(255,255,255,0.03); 
            border-radius: 4px; cursor: pointer; font-size: 13px;
            display: flex; justify-content: space-between; align-items: center;
            transition: 0.4s ease; 
            position: relative; overflow: hidden;
        }
        .v-item .v-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; margin-right: 10px; }
        .v-item .v-dur { opacity: 0.5; font-family: monospace; font-size: 11px; min-width: 45px; text-align: right; }

        .v-item::after {
            content: ""; position: absolute; top: 50%; left: 50%; width: 0; height: 0;
            background: rgba(var(--neon-rgb), 0.4); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0;
        }
        .v-item:active::after { width: 500px; height: 500px; opacity: 0; transition: width 0.6s, height 0.6s, opacity 0.6s; }

        .v-item:hover { background: rgba(255,255,255,0.08); box-shadow: inset 0 0 10px rgba(var(--neon-rgb), 0.3); }
        .v-item.active { background: linear-gradient(90deg, var(--neon) 0%, #ffffff 100%); color: #000; font-weight: bold; transform: translateX(5px); box-shadow: 0 0 15px var(--neon); }

        /* --- 設定頁 --- */
        #settings-layer { position: absolute; top:0; right:-100%; width:100%; height:100%; background:#0a0a1f; z-index: 3000; transition: 0.6s ease-in-out; padding: 60px; border-left: 3px solid var(--neon); }
        #settings-layer.active { right: 0; }
        .back-circle { width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--neon); transition: 0.3s, color 0.8s; margin-bottom: 25px; font-size: 24px; }
        .back-circle:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px var(--neon); }
        
        .c-btn { width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .c-btn.active { border-color: #fff; box-shadow: 0 0 15px #fff; }

        #context-menu { position: fixed; width: 140px; background: rgba(15,15,35,0.98); border: 1px solid var(--neon); border-radius: 4px; z-index: 2000; display: none; transition: border-color 0.8s; }
        .menu-item { padding: 12px 15px; font-size: 13px; cursor: pointer; }
        .menu-item:hover { background: var(--neon); color: #000; }
    </style>
</head>
<body oncontextmenu="handleContextMenu(event)">

<header>
    <div class="logo" ondblclick="location.href='AL.html'" title="ADMIN ONLY">V1DE0_+EcHN0</div>
    <div class="setting-icon" id="setBtn" onclick="toggleSettings(true)">⚙️</div>
</header>

<div class="main-container">
    <div class="video-section" id="dropZone">
        <video id="mainV" onclick="togglePlay()"></video>
        <div id="pause-indicator"></div>
        <div class="controls">
            <div class="btn" onclick="skip(-5)">⟲</div>
            <div class="btn" onclick="togglePlay()" id="playBtn">▶</div>
            <div class="btn" onclick="skip(5)">⟳</div>
            <div id="progress-wrap"><div id="progress-bar"><div id="progress-inner"></div></div></div>
            <div style="font-size:12px; font-family:monospace; min-width:85px;"><span id="curT">00:00</span> / <span id="durT">00:00</span></div>
            <div class="btn" onclick="toggleFS()"><div class="fs-rect"></div></div>
            <div class="btn" onclick="toggleAside()">◫</div>
        </div>
    </div>

    <aside id="sideList">
        <div class="list-header">
            <span>PLAYLIST</span>
            <div class="play-all-btn" onclick="playAll()">PLAY ALL</div>
        </div>
        <div id="vList"></div>
    </aside>

    <div id="settings-layer">
        <div class="back-circle" onclick="toggleSettings(false)">←</div>
        <h2 style="color:var(--neon); margin-bottom:20px; transition: color 0.8s;">THEME COLOR</h2>
        <div style="display:flex; gap:15px; margin-bottom:40px;">
            <div class="c-btn" style="background:#00ffff" onclick="applyTheme('#00ffff')"></div>
            <div class="c-btn" style="background:#ff00ff" onclick="applyTheme('#ff00ff')"></div>
            <div class="c-btn" style="background:#00ff00" onclick="applyTheme('#00ff00')"></div>
            <div class="c-btn" style="background:#ffff00" onclick="applyTheme('#ffff00')"></div>
            <div class="c-btn" style="background:#ff4400" onclick="applyTheme('#ff4400')"></div>
        </div>
        <h2 style="color:var(--neon); margin-bottom:20px; transition: color 0.8s;">IMPORT</h2>
        <input type="file" id="fileIn" multiple accept="video/*" onchange="handleFileSelect(this.files)" style="display:none;">
        <label for="fileIn" class="play-all-btn" style="padding: 10px 20px; font-size: 14px;">CHOOSE FILES</label>
    </div>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="deleteVideo()">DELETE VIDEO</div>
    <div class="menu-item" onclick="toggleLoop()">LOOP: <span id="loopStat">OFF</span></div>
</div>

<script>
	if (window.self !== window.top) {
		document.body.classList.add('is-embedded');
	}
	
    const v = document.getElementById('mainV');
    const pInner = document.getElementById('progress-inner');
    const pWrap = document.getElementById('progress-wrap');
    const dz = document.getElementById('dropZone');
    let db, playlist = [], currentIdx = -1, rightIdx = -1;

    // --- IndexedDB ---
    const request = indexedDB.open("VideoDB", 1);
    request.onupgradeneeded = e => {
        db = e.target.result;
        if(!db.objectStoreNames.contains("videos")) db.createObjectStore("videos", { keyPath: "id", autoIncrement: true });
    };
    request.onsuccess = e => { db = e.target.result; loadVideosFromDB(); };

    function loadVideosFromDB() {
        const transaction = db.transaction(["videos"], "readonly");
        transaction.objectStore("videos").getAll().onsuccess = e => {
            playlist = e.target.result.map(item => ({
                ...item,
                url: URL.createObjectURL(item.file),
                duration: item.duration || "--:--"
            }));
            renderList();
        };
    }

    async function handleFileSelect(files) {
        for (let f of files) {
            const transaction = db.transaction(["videos"], "readwrite");
            const store = transaction.objectStore("videos");
            const newItem = { name: f.name, file: f, duration: "--:--" };
            const addReq = store.add(newItem);
            
            addReq.onsuccess = (e) => {
                const id = e.target.result;
                loadVideosFromDB();
                getVideoDuration(f).then(dur => updateDurationInDB(id, dur));
            };
        }
    }

    function updateDurationInDB(id, dur) {
        const tx = db.transaction(["videos"], "readwrite");
        const store = tx.objectStore("videos");
        store.get(id).onsuccess = e => {
            const data = e.target.result;
            data.duration = dur;
            store.put(data);
            tx.oncomplete = () => loadVideosFromDB();
        };
    }

    function getVideoDuration(file) {
        return new Promise(resolve => {
            const tempV = document.createElement('video');
            tempV.preload = 'metadata';
            tempV.src = URL.createObjectURL(file);
            tempV.onloadedmetadata = () => { resolve(fmt(tempV.duration)); URL.revokeObjectURL(tempV.src); };
            tempV.onerror = () => resolve("??:??");
        });
    }

    // --- 播放邏輯 ---
    function togglePlay() { 
        if(v.paused) { v.play(); document.getElementById('pause-indicator').style.display='none'; }
        else { v.pause(); document.getElementById('pause-indicator').style.display='flex'; }
    }
    v.onplay = () => document.getElementById('playBtn').innerText = '||';
    v.onpause = () => document.getElementById('playBtn').innerText = '▶';
    v.onended = () => { if(currentIdx < playlist.length - 1) playIdx(currentIdx + 1); };

    function playAll() { if(playlist.length > 0) playIdx(0); }

    function renderList() {
        const container = document.getElementById('vList');
        container.innerHTML = playlist.map((vid, i) => `
            <div class="v-item ${i===currentIdx?'active':''}" onclick="playIdx(${i})" data-index="${i}">
                <span class="v-name">${vid.name}</span>
                <span class="v-dur">${vid.duration}</span>
            </div>
        `).join('');
    }

    function playIdx(i) {
        currentIdx = i;
        if(playlist[i]) { v.src = playlist[i].url; v.play(); renderList(); }
    }

    function deleteVideo() {
        if(rightIdx === -1) return;
        const id = playlist[rightIdx].id;
        db.transaction(["videos"], "readwrite").objectStore("videos").delete(id).onsuccess = () => loadVideosFromDB();
    }

    // --- UI 控制 ---
    function toggleSettings(s) { 
        document.getElementById('settings-layer').classList.toggle('active', s);
        document.getElementById('setBtn').classList.toggle('hidden', s);
    }
    function toggleAside() { document.getElementById('sideList').classList.toggle('collapsed'); }
    function toggleFS() { if(!document.fullscreenElement) dz.requestFullscreen(); else document.exitFullscreen(); }
    function skip(s) { v.currentTime += s; }
    function fmt(s) { if(isNaN(s)) return "00:00"; let m=Math.floor(s/60),sec=Math.floor(s%60); return (m<10?'0'+m:m)+":"+(sec<10?'0'+sec:sec); }

    // --- 拖放 & 進度條 ---
    dz.ondragover = e => { e.preventDefault(); dz.style.background = "rgba(var(--neon-rgb), 0.1)"; };
    dz.ondragleave = () => dz.style.background = "#000";
    dz.ondrop = e => { e.preventDefault(); dz.style.background = "#000"; handleFileSelect(e.dataTransfer.files); };

    let isDragging = false;
    pWrap.onmousedown = e => { isDragging = true; updateP(e); };
    window.onmousemove = e => { if(isDragging) updateP(e); };
    window.onmouseup = () => isDragging = false;
    function updateP(e) {
        const rect = pWrap.getBoundingClientRect();
        v.currentTime = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width)) * v.duration;
    }
    v.ontimeupdate = () => {
        pInner.style.width = (v.currentTime/v.duration*100) + "%";
        document.getElementById('curT').innerText = fmt(v.currentTime);
        document.getElementById('durT').innerText = fmt(v.duration);
    };

    function handleContextMenu(e) {
        e.preventDefault();
        const m = document.getElementById('context-menu');
        const item = e.target.closest('.v-item');
        if(item) { rightIdx = parseInt(item.dataset.index); m.style.display = 'block'; m.style.left = e.clientX+'px'; m.style.top = e.clientY+'px'; }
    }

    function applyTheme(c) {
        document.documentElement.style.setProperty('--neon', c);
        const r = parseInt(c.slice(1,3), 16), g = parseInt(c.slice(3,5), 16), b = parseInt(c.slice(5,7), 16);
        document.documentElement.style.setProperty('--neon-rgb', `${r},${g},${b}`);
        localStorage.setItem('V1DE0_Theme', c);
        document.querySelectorAll('.c-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(c));
        });
    }
    
    function toggleLoop() { v.loop = !v.loop; document.getElementById('loopStat').innerText = v.loop?'ON':'OFF'; }

    window.onload = () => applyTheme(localStorage.getItem('V1DE0_Theme') || '#00ffff');
    window.onclick = () => document.getElementById('context-menu').style.display='none';
    let st;
    window.onkeydown = e => {
        if(e.code === 'Space') { e.preventDefault(); if(!st) st = setTimeout(()=>v.playbackRate=2, 400); }
        if(e.code === 'ArrowRight') skip(5); if(e.code === 'ArrowLeft') skip(-5);
    };
    window.onkeyup = e => {
        if(e.code === 'Space') { clearTimeout(st); st=null; if(v.playbackRate===2) v.playbackRate=1; else togglePlay(); }
    };
</script>
</body>
</html>
